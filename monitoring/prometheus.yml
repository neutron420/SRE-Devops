global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Scraping endpoints configuration
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the SRE FastAPI backend
  - job_name: 'backend-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend-api:8000']
