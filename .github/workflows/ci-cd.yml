name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Lint & Test API
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend-api/requirements.txt
        pip install flake8

    - name: Lint with flake8
      run: |
        # Stop build on syntax errors
        flake8 backend-api --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat other warnings as warnings (non-blocking)
        flake8 backend-api --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests with pytest
      env:
        GEMINI_API_KEY: "your_gemini_api_key_here"
        CHROMADB_PERSIST_DIRECTORY: "./vector-db/test_chroma_data"
      run: |
        cd backend-api
        python -m pytest

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend-api
        file: ./backend-api/Dockerfile
        push: false
        tags: devops-copilot-backend:latest

    - name: Build Discord Bot Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./discord-bot
        file: ./discord-bot/Dockerfile
        push: false
        tags: devops-copilot-bot:latest

    - name: Build Landing Page Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./landing
        file: ./landing/Dockerfile
        push: false
        tags: devops-copilot-landing:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ec2-user/copilot-devops

          # Pull latest code (if using git) or files are already uploaded
          echo ">>> Pulling latest changes..."
          git pull origin main || git pull origin master || true
          
          # Rebuild and restart containers with zero downtime
          echo ">>> Rebuilding containers..."
          docker compose build --no-cache
          
          echo ">>> Restarting services..."
          docker compose up -d --force-recreate
          
          # Wait for health check
          echo ">>> Waiting for API to be healthy..."
          sleep 15
          
          # Verify deployment
          echo ">>> Health Check:"
          curl -sf http://localhost:8000/health && echo " - API is healthy!" || echo " - API health check failed!"
          
          echo ">>> Container Status:"
          docker compose ps
