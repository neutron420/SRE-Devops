version: '3.8'

services:
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: copilot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMADB_PERSIST_DIRECTORY=/app/vector-db/chroma_data
      - POSTGRES_HOST=db
    volumes:
      - ./backend-api/app:/app/app
      - chroma_data:/app/vector-db/chroma_data
      - ./docs:/app/docs
      - ./kube:/root/.kube:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    container_name: copilot-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - BACKEND_API_URL=http://backend-api:8000
    depends_on:
      backend-api:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: copilot-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-devops_copilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: copilot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    image: grafana/grafana:10.4.1
    container_name: copilot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: copilot-landing
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend-api:8000
    depends_on:
      - backend-api

volumes:
  postgres_data:
  chroma_data:
  prometheus_data:
  grafana_data:
